<!DOCTYPE html>
<html lang="yo">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#3d1a08">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Ọ̀rọ̀ Ọlọrun</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ── Variables ── */
:root {
  --bg:     #faf8f4; --bg2:    #f2ede4; --bg3:    #e9e2d6;
  --surf:   #ffffff; --border: #e4dbd0;
  --txt:    #18110a; --txt2:   #5c4a37; --txt3:   #9e8e7c;
  --gold:   #7a4f0e; --gold2:  #b8750c; --gold-lt:#f7edd4; --gold-bg:#fdf5e4;
  --hdr:    #2c1206; --hdr2:   #4a2010;
  --nav-h:  64px;    --bar-h:  70px;
  --fs:     18px;
  --radius: 16px;
  --shadow: 0 2px 12px rgba(0,0,0,.07);
  --shadow-md: 0 6px 24px rgba(0,0,0,.10);
}
:root.dark {
  --bg:     #0e0c0a; --bg2:    #161410; --bg3:    #1e1b16;
  --surf:   #1c1a16; --border: #2c2820;
  --txt:    #ede8de; --txt2:   #9c8e7a; --txt3:   #5c5248;
  --gold:   #c8a050; --gold2:  #e4be6c; --gold-lt:#1c150a; --gold-bg:#1a140a;
  --hdr:    #0a0806; --hdr2:   #14100c;
  --shadow: 0 2px 12px rgba(0,0,0,.3);
  --shadow-md: 0 6px 24px rgba(0,0,0,.4);
}
* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
html,body { height:100%; overscroll-behavior:none; }
body {
  font-family:'Inter', -apple-system, 'Segoe UI', sans-serif;
  background:var(--bg); color:var(--txt); font-size:var(--fs);
  -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale;
}

/* ── Shell ── */
#app {
  max-width:480px; margin:0 auto; min-height:100vh;
  display:flex; flex-direction:column; position:relative;
  background:var(--bg); overflow-x:hidden;
}
.screen { display:none; flex:1; overflow-y:auto; overflow-x:hidden; position:relative; }
.screen.active { display:flex; flex-direction:column; }
.screen::-webkit-scrollbar { width:0; }
.pad { padding:18px 16px; }
#verseContent { overflow-anchor: none; }

/* ── Screen background images ── */
#s-home,#s-bookmarks {
  background: linear-gradient(rgba(250,248,244,.85),rgba(250,248,244,.85)),
              url('images/heaven.jpg') center top / cover no-repeat;
}
#s-chapters,#s-audio {
  background: linear-gradient(rgba(250,248,244,.85),rgba(250,248,244,.85)),
              url('images/cross.jpg') center / cover no-repeat;
}
#s-verses {
  background: linear-gradient(rgba(250,248,244,.85),rgba(250,248,244,.85)),
              url('images/ima.jpg') center / cover no-repeat;
}
#s-search,#s-settings {
  background: linear-gradient(rgba(250,248,244,.85),rgba(250,248,244,.85)),
              url('images/image.jpg') center / cover no-repeat;
}
.dark #s-home,.dark #s-bookmarks {
  background: linear-gradient(rgba(14,12,10,.85),rgba(14,12,10,.85)),
              url('images/heaven.jpg') center top / cover no-repeat;
}
.dark #s-chapters,.dark #s-audio {
  background: linear-gradient(rgba(14,12,10,.85),rgba(14,12,10,.85)),
              url('images/cross.jpg') center / cover no-repeat;
}
.dark #s-verses {
  background: linear-gradient(rgba(14,12,10,.85),rgba(14,12,10,.85)),
              url('images/ima.jpg') center / cover no-repeat;
}
.dark #s-search,.dark #s-settings {
  background: linear-gradient(rgba(14,12,10,.85),rgba(14,12,10,.85)),
              url('images/image.jpg') center / cover no-repeat;
}

/* ── Header ── */
.app-hdr {
  background:linear-gradient(160deg,var(--hdr) 0%,var(--hdr2) 100%);
  padding:14px 18px 12px; flex-shrink:0;
  position:sticky; top:0; z-index:10;
  box-shadow:0 2px 16px rgba(0,0,0,.25);
}
.hdr-row { display:flex; justify-content:space-between; align-items:center; }
.hdr-title { color:#f7edd4; font-size:20px; font-weight:700; line-height:1.2;
             font-family:'Cormorant Garamond', serif; letter-spacing:.3px; }
.hdr-sub   { color:rgba(247,237,212,.5); font-size:11px; margin-top:2px; letter-spacing:.4px; }
.hdr-btns  { display:flex; gap:6px; }
.hdr-btn   { background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.1);
             border-radius:10px; width:36px; height:36px; color:#f7edd4; font-size:17px;
             cursor:pointer; display:flex; align-items:center; justify-content:center;
             flex-shrink:0; transition:background .15s; }
.hdr-btn:active { background:rgba(255,255,255,.18); }

/* ── Bottom Nav ── */
.nav-bar {
  position:fixed; bottom:0; left:50%; transform:translateX(-50%);
  width:100%; max-width:480px; height:var(--nav-h);
  background:var(--surf); border-top:1px solid var(--border);
  display:flex; z-index:20; flex-shrink:0;
  box-shadow:0 -2px 20px rgba(0,0,0,.06);
}
.nav-item {
  flex:1; display:flex; flex-direction:column; align-items:center;
  justify-content:center; gap:3px; cursor:pointer;
  color:var(--txt3); font-size:11px; font-weight:600; letter-spacing:.4px;
  user-select:none; transition:color .2s; padding:4px 0;
  text-transform:uppercase;
}
.nav-item.active { color:var(--gold); }
.nav-icon { font-size:24px; line-height:1; }

/* ── Mini Audio Bar ── */
.audio-bar {
  position:fixed; bottom:var(--nav-h); left:50%; transform:translateX(-50%);
  width:100%; max-width:480px; height:var(--bar-h);
  background:linear-gradient(135deg,var(--hdr),var(--hdr2));
  display:none; align-items:center; gap:10px; padding:0 16px;
  z-index:19; border-top:1px solid rgba(255,255,255,.06);
  cursor:pointer;
}
.audio-bar.show { display:flex; }
.bar-info { flex:1; min-width:0; pointer-events:none; }
.bar-title { color:#f7edd4; font-size:13px; font-weight:600;
             white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.bar-sub   { color:rgba(247,237,212,.45); font-size:11px; margin-top:1px; }
.bar-btn   { background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.08);
             border-radius:50%; width:38px; height:38px; color:#f7edd4; font-size:17px;
             cursor:pointer; display:flex; align-items:center; justify-content:center;
             flex-shrink:0; transition:background .15s; }
.bar-btn:active { background:rgba(255,255,255,.22); }
.bar-progress { position:absolute; bottom:0; left:0; height:2px;
                background:linear-gradient(90deg,var(--gold),var(--gold2));
                transition:width .5s linear; }

/* ── Content padding ── */
.has-bar  { padding-bottom:calc(var(--bar-h) + var(--nav-h) + 12px) !important; }
.no-bar   { padding-bottom:calc(var(--nav-h) + 12px) !important; }

/* ── Home ── */
.daily-card {
  background:linear-gradient(145deg,var(--hdr) 0%,var(--hdr2) 100%);
  border-radius:20px; padding:20px; margin-bottom:20px;
  position:relative; overflow:hidden;
  box-shadow:var(--shadow-md);
}
.daily-card::before { content:''; position:absolute; right:-30px; top:-30px;
  width:130px; height:130px; background:rgba(247,237,212,.04); border-radius:50%; }
.daily-card::after  { content:''; position:absolute; left:-20px; bottom:-40px;
  width:100px; height:100px; background:rgba(247,237,212,.03); border-radius:50%; }
.daily-tag  { color:rgba(247,237,212,.6); font-size:9.5px; font-weight:700;
              letter-spacing:1.5px; text-transform:uppercase; margin-bottom:10px; }
.daily-txt  { color:#f7edd4; font-size:15px; line-height:1.75; font-style:italic;
              margin-bottom:10px; font-family:'Cormorant Garamond', serif; font-size:17px; }
.daily-ref  { color:rgba(247,237,212,.5); font-size:11.5px; font-weight:500; letter-spacing:.3px; }

.section-hd { font-size:10px; font-weight:700; letter-spacing:1.2px; text-transform:uppercase;
              color:var(--gold); margin-bottom:12px; }
.tab-row    { display:flex; gap:8px; margin-bottom:16px; }
.tab-btn    { flex:1; background:var(--bg2); border:1.5px solid var(--border);
              border-radius:12px; padding:10px 4px; text-align:center; cursor:pointer;
              font-size:13px; font-weight:600; color:var(--txt2); transition:all .18s; }
.tab-btn.active { background:var(--gold-bg); border-color:var(--gold); color:var(--gold); }
.book-grid  { display:grid; grid-template-columns:repeat(3,1fr); gap:9px; }
.book-card  {
  background:var(--surf); border:1px solid var(--border); border-radius:14px;
  padding:12px 6px; text-align:center; cursor:pointer; user-select:none;
  transition:all .18s; box-shadow:var(--shadow);
}
.book-card:active { background:var(--gold-bg); border-color:var(--gold); transform:scale(.97); }
.book-card.has-audio .book-dot { display:inline-block; }
.book-dot  { display:none; width:5px; height:5px; background:var(--gold2);
             border-radius:50%; margin:0 auto 5px; }
.book-nm   { font-size:15px; font-weight:600; color:var(--txt); line-height:1.3; }
.book-ch   { font-size:12px; color:var(--txt3); margin-top:3px; }

/* ── Chapters ── */
.back-btn   { display:flex; align-items:center; gap:6px; background:none; border:none;
              color:var(--txt2); font-size:14px; cursor:pointer; padding:0;
              font-family:inherit; transition:color .15s; }
.back-btn:active { color:var(--gold); }
.scr-title  { font-size:22px; font-weight:700; color:var(--txt);
              font-family:'Cormorant Garamond', serif; }
.scr-sub    { font-size:12px; color:var(--txt3); margin-top:4px; letter-spacing:.2px; }
.ch-grid    { display:grid; grid-template-columns:repeat(5,1fr); gap:8px; margin-top:14px; }
.ch-btn     { background:var(--surf); border:1px solid var(--border); border-radius:12px;
              padding:14px 4px; text-align:center; cursor:pointer; user-select:none;
              font-size:15px; font-weight:600; color:var(--txt2); transition:all .18s;
              box-shadow:var(--shadow); }
.ch-btn:active   { background:var(--gold-bg); border-color:var(--gold); color:var(--gold); transform:scale(.95); }
.ch-btn.playing  { background:var(--gold-bg); border-color:var(--gold); color:var(--gold); }
.ch-btn.has-audio::after { content:''; display:block; width:4px; height:4px;
                            background:var(--gold2); border-radius:50%; margin:4px auto 0; }

/* ── Verses ── */
.verse-topbar { display:flex; align-items:center; justify-content:space-between; gap:8px; }
.vnav-btns   { display:flex; gap:6px; }
.icon-btn    { background:var(--bg2); border:1px solid var(--border); border-radius:10px;
               width:38px; height:38px; display:flex; align-items:center; justify-content:center;
               cursor:pointer; font-size:16px; color:var(--txt2); flex-shrink:0;
               transition:all .15s; }
.icon-btn:active { background:var(--gold-bg); border-color:var(--gold); }
.play-ch-btn { background:linear-gradient(135deg,var(--gold),var(--gold2)); border:none;
               border-radius:50%; width:40px; height:40px; color:#fff; font-size:16px;
               cursor:pointer; display:flex; align-items:center; justify-content:center;
               flex-shrink:0; box-shadow:0 3px 10px rgba(122,79,14,.35); }
.play-ch-btn:active { opacity:.8; }
.play-ch-btn.pause { background:var(--txt2); box-shadow:none; }
.verse-row  { display:flex; gap:12px; padding:14px 0; border-bottom:1px solid var(--border);
              cursor:default; transition:background .12s; border-left:3px solid transparent; }
.verse-row:last-child { border-bottom:none; }
.verse-row.playing   { background:var(--gold-lt); border-left:3px solid var(--gold);
                        border-bottom:1px solid transparent; }
.dark .verse-row.playing { background:var(--gold-bg); }
.v-num  { color:var(--gold); font-size:12px; font-weight:700;
          min-width:22px; flex-shrink:0; margin-top:4px; line-height:1; letter-spacing:.3px; }
.v-txt  { color:#0e0804; font-size:var(--fs); line-height:1.8; flex:1;
          font-family:'Cormorant Garamond', serif; font-weight:600; }
.dark .v-txt { color:#cfc5b5; }
.v-bm   { font-size:16px; flex-shrink:0; opacity:.25; margin-top:3px; transition:opacity .15s; }
.v-bm.saved { opacity:1; }
.no-data { color:var(--txt3); font-size:14px; line-height:1.6; padding:24px 0;
           text-align:center; font-style:italic; }

/* ── Full Audio Player ── */
.audio-screen {
  background:linear-gradient(160deg,var(--hdr) 0%,var(--hdr2) 55%,#180a04 100%);
  min-height:100%; display:flex; flex-direction:column;
  padding:20px 20px 28px;
}
.ap-picker { display:flex; flex-direction:column; gap:14px; padding:10px 0; }
.ap-picker-title { color:rgba(247,237,212,.6); font-size:11px; font-weight:700;
  letter-spacing:1.2px; text-transform:uppercase; text-align:center; margin-bottom:4px; }
.ap-pick-row { display:flex; flex-direction:column; gap:6px; }
.ap-pick-label { color:rgba(247,237,212,.5); font-size:11px; font-weight:600;
  letter-spacing:.5px; text-transform:uppercase; }
.ap-pick-sel { background:rgba(247,237,212,.08); border:1px solid rgba(247,237,212,.15);
  border-radius:14px; padding:13px 16px; font-size:15px; color:#f7edd4;
  font-family:inherit; width:100%; appearance:none; cursor:pointer; }
.ap-pick-sel option { background:#1a1005; color:#f7edd4; }
.ap-play-now { margin-top:8px; padding:16px; border-radius:16px;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  border:none; color:#fff; font-size:16px; font-weight:700;
  cursor:pointer; width:100%; letter-spacing:.3px; }
.ap-change-btn { align-self:center; margin-top:6px; padding:7px 18px;
  background:rgba(247,237,212,.1); border:1px solid rgba(247,237,212,.18);
  border-radius:20px; color:rgba(247,237,212,.7); font-size:12px;
  font-weight:600; cursor:pointer; letter-spacing:.3px; transition:all .15s; }
.ap-change-btn:hover { background:rgba(247,237,212,.18); color:#f7edd4; }
.ap-artwork { width:160px; height:160px; margin:16px auto 20px;
              background:rgba(247,237,212,.07); border-radius:28px;
              display:flex; align-items:center; justify-content:center;
              font-size:72px; box-shadow:0 20px 60px rgba(0,0,0,.45);
              border:1px solid rgba(247,237,212,.1); }
.ap-title   { color:#f7edd4; font-size:22px; font-weight:700; text-align:center;
              margin-bottom:4px; font-family:'Cormorant Garamond', serif; }
.ap-sub     { color:rgba(247,237,212,.45); font-size:13px; text-align:center; margin-bottom:20px; }
.seek-wrap  { margin:16px 0 6px; }
.seek-track { position:relative; height:3px; background:rgba(247,237,212,.15);
              border-radius:2px; margin-bottom:4px; }
.seek-fill  { position:absolute; left:0; top:0; height:100%;
              background:linear-gradient(90deg,var(--gold),var(--gold2));
              border-radius:2px; pointer-events:none; }
.seek-input { position:absolute; inset:0; width:100%; height:100%; opacity:0;
              cursor:pointer; -webkit-appearance:none; appearance:none; margin:0; }
.seek-input { top:-8px; height:20px; }
.seek-times { display:flex; justify-content:space-between; }
.seek-t     { color:rgba(247,237,212,.35); font-size:11px; }
.ap-ctrls   { display:flex; align-items:center; justify-content:center; gap:14px; margin-top:8px; }
.ap-btn     { background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.08);
              border-radius:50%; cursor:pointer; color:rgba(247,237,212,.7);
              display:flex; align-items:center; justify-content:center; transition:all .15s; }
.ap-btn-sm  { width:46px; height:46px; font-size:16px; }
.ap-btn-md  { width:52px; height:52px; font-size:20px; }
.ap-btn-play{ width:70px; height:70px; font-size:30px;
              background:#f7edd4; color:#2c1206; border:none;
              box-shadow:0 8px 28px rgba(0,0,0,.4); }
.ap-btn:active { opacity:.65; transform:scale(.94); }
.ap-speed   { display:flex; justify-content:center; gap:8px; margin-top:18px; }
.sp-pill    { background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.08);
              border-radius:20px; padding:6px 14px; color:rgba(247,237,212,.5);
              font-size:12px; cursor:pointer; font-family:inherit; transition:all .15s; }
.sp-pill.active { background:rgba(247,237,212,.2); color:#f7edd4;
                  border-color:rgba(247,237,212,.2); }
.ap-verse-badge { background:rgba(247,237,212,.1); border-radius:20px;
                  padding:6px 16px; text-align:center; margin:14px auto 0;
                  color:rgba(247,237,212,.65); font-size:12px; cursor:pointer;
                  border:1px solid rgba(247,237,212,.1); }
.ap-verse-text  { color:rgba(247,237,212,.8); font-size:15px; line-height:1.7;
                  text-align:center; margin-top:8px; font-style:italic;
                  padding:0 8px; font-family:'Cormorant Garamond', serif; }

/* ── Search ── */
.search-box { display:flex; align-items:center; background:var(--surf);
              border:1.5px solid var(--border); border-radius:14px;
              padding:0 14px; gap:10px; margin-bottom:14px;
              box-shadow:var(--shadow); }
.search-icon { color:var(--txt3); font-size:17px; flex-shrink:0; }
.search-input{ flex:1; border:none; background:none; padding:14px 0;
               font-size:15px; color:var(--txt); outline:none; font-family:inherit; }
.search-input::placeholder { color:var(--txt3); }
.search-res  { background:var(--surf); border:1px solid var(--border); border-radius:14px;
               padding:14px; margin-bottom:9px; cursor:pointer;
               box-shadow:var(--shadow); transition:all .15s; }
.search-res:active { background:var(--gold-bg); border-color:var(--gold); }
.res-ref    { color:var(--gold); font-size:11.5px; font-weight:700; margin-bottom:5px;
              letter-spacing:.3px; }
.res-txt    { color:var(--txt2); font-size:14px; line-height:1.6; }
em          { color:var(--gold2); font-style:normal; font-weight:600; }

/* ── Bookmarks ── */
.bm-card    { background:var(--surf); border:1px solid var(--border); border-radius:14px;
              padding:16px; margin-bottom:10px; cursor:pointer; box-shadow:var(--shadow);
              transition:all .15s; }
.bm-card:active { background:var(--gold-bg); border-color:var(--gold); }
.bm-ref     { color:var(--gold); font-size:11.5px; font-weight:700; margin-bottom:6px;
              letter-spacing:.3px; }
.bm-txt     { color:var(--txt2); font-size:14px; line-height:1.6; }
.bm-del     { color:var(--txt3); font-size:12px; margin-top:10px; display:inline-flex;
              align-items:center; gap:4px; }

/* ── Settings ── */
.set-section{ font-size:9.5px; font-weight:700; letter-spacing:1.4px; text-transform:uppercase;
              color:var(--gold); margin:22px 0 10px; }
.set-row    { display:flex; align-items:center; justify-content:space-between;
              background:var(--surf); border:1px solid var(--border); border-radius:14px;
              padding:15px 16px; margin-bottom:8px; box-shadow:var(--shadow); }
.set-label  { font-size:14px; font-weight:600; color:var(--txt); }
.set-sub    { font-size:11px; color:var(--txt3); margin-top:2px; }
.toggle     { width:48px; height:26px; background:var(--border); border-radius:13px;
              position:relative; cursor:pointer; transition:background .22s;
              border:none; flex-shrink:0; }
.toggle.on  { background:var(--gold); }
.toggle::after { content:''; position:absolute; top:3px; left:3px;
                 width:20px; height:20px; background:#fff; border-radius:50%;
                 transition:transform .22s; box-shadow:0 1px 4px rgba(0,0,0,.25); }
.toggle.on::after { transform:translateX(22px); }
.font-ctrl  { display:flex; align-items:center; gap:8px; }
.f-btn      { background:var(--bg2); border:1px solid var(--border); border-radius:9px;
              width:34px; height:34px; display:flex; align-items:center; justify-content:center;
              cursor:pointer; font-size:18px; color:var(--txt2); flex-shrink:0; }
.f-val      { font-size:14px; font-weight:600; color:var(--txt); min-width:28px; text-align:center; }
.theme-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:8px; }
.theme-opt  { border:2px solid var(--border); border-radius:14px; padding:14px;
              text-align:center; cursor:pointer; transition:all .18s; box-shadow:var(--shadow); }
.theme-opt.active { border-color:var(--gold); background:var(--gold-bg); }
.theme-sw   { width:36px; height:36px; border-radius:9px; margin:0 auto 7px;
              border:1px solid rgba(0,0,0,.08); }
.theme-nm   { font-size:12px; font-weight:600; color:var(--txt); }

/* ── Utilities ── */
.empty { text-align:center; padding:52px 20px; }
.empty-ico { font-size:46px; margin-bottom:14px; opacity:.3; }
.empty-txt { color:var(--txt3); font-size:14px; line-height:1.7; }
/* ── Verse Picker Modal ── */
.vpick-overlay { position:fixed; inset:0; background:rgba(0,0,0,.55); z-index:200;
  display:none; align-items:flex-end; justify-content:center; }
.vpick-overlay.show { display:flex; }

<!-- Data files (generated externally) -->
<script src="bible_data.js"  onerror="window.BIBLE_DATA=null"></script>
<script src="audio_map.js"   onerror="window.AUDIO_MAP=null"></script>

<script>
'use strict';
/* ═══════════════════════════════════════════════
   Ọ̀rọ̀ Ọlọrun — Main Application Script
   All event handlers via addEventListener / delegation.
   No inline onclick attributes.
   ═══════════════════════════════════════════════ */

// ── Book data ──────────────────────────────────
const BOOKS = [
  // OT (indices 0-38)
  {n:'Jẹ́nẹ́sísì',     a:'Jẹn',ch:50}, {n:'Ẹkísódù',       a:'Ẹks',ch:40},
  {n:'Lefítíkọ̀sì',    a:'Lef',ch:27}, {n:'Nọ́mbà',          a:'Nọm',ch:36},
  {n:'Deuterónomì',   a:'Deu',ch:34}, {n:'Jóṣúà',           a:'Jós',ch:24},
  {n:'Onídàájọ́',      a:'Onì',ch:21}, {n:'Rúùtù',           a:'Rút',ch:4 },
  {n:'1 Sámúẹ̀lì',    a:'1Sa',ch:31}, {n:'2 Sámúẹ̀lì',      a:'2Sa',ch:24},
  {n:'1 Àwọn Ọba',   a:'1Ọb',ch:22}, {n:'2 Àwọn Ọba',     a:'2Ọb',ch:25},
  {n:'1 Ìtàn',        a:'1It',ch:29}, {n:'2 Ìtàn',          a:'2It',ch:36},
  {n:'Ẹsdírà',        a:'Ẹsd',ch:10}, {n:'Néẹmáíà',         a:'Née',ch:13},
  {n:'Ẹ́sítà',         a:'Ẹst',ch:10}, {n:'Jóòbù',           a:'Jób',ch:42},
  {n:'Sáàmù',         a:'Sám',ch:150},{n:'Òwe',              a:'Òwe',ch:31},
  {n:'Onígbàgbọ́',    a:'Oni',ch:12}, {n:'Orin Sólómónì',  a:'Ori',ch:8 },
  {n:'Áísáyà',        a:'Áís',ch:66}, {n:'Jẹ́rẹ́máíà',       a:'Jẹr',ch:52},
  {n:'Ekún Jẹ́rẹ́máíà',a:'Ekú',ch:5 }, {n:'Ẹ̀sékíẹ̀lì',      a:'Ẹse',ch:48},
  {n:'Dánì',          a:'Dán',ch:12}, {n:'Hóṣéà',           a:'Hós',ch:14},
  {n:'Jóẹ̀lì',        a:'Jóẹ',ch:3 }, {n:'Ámọ̀sì',           a:'Ámọ',ch:9 },
  {n:'Óbádáíà',       a:'Óbá',ch:1 }, {n:'Jónà',            a:'Jón',ch:4 },
  {n:'Míkà',          a:'Mík',ch:7 }, {n:'Náhùmù',          a:'Náh',ch:3 },
  {n:'Hábákúkù',      a:'Háb',ch:3 }, {n:'Séfáníà',         a:'Séf',ch:3 },
  {n:'Háàgáì',        a:'Háà',ch:2 }, {n:'Sékáríà',         a:'Sék',ch:14},
  {n:'Málákì',        a:'Mál',ch:4 },
  // NT (indices 39-65)
  {n:'Mátíù',         a:'Mát',ch:28}, {n:'Máàkù',           a:'Máà',ch:16},
  {n:'Lúùkù',         a:'Lúù',ch:24}, {n:'Jòhánù',          a:'Joh',ch:21},
  {n:'Ìṣe Àwọn Àpọ́stélì',a:'Ìṣe',ch:28},{n:'Ìjọ Rómà',   a:'Róm',ch:16},
  {n:'1 Kọ́ríńtì',    a:'1Ko',ch:16}, {n:'2 Kọ́ríńtì',      a:'2Ko',ch:13},
  {n:'Gálátíà',       a:'Gál',ch:6 }, {n:'Éfésù',           a:'Éfe',ch:6 },
  {n:'Fílípì',        a:'Fíl',ch:4 }, {n:'Kólósè',          a:'Kól',ch:4 },
  {n:'1 Tẹ̀sálónáíkà',a:'1Te',ch:5 }, {n:'2 Tẹ̀sálónáíkà', a:'2Te',ch:3 },
  {n:'1 Tímọ́tì',     a:'1Ti',ch:6 }, {n:'2 Tímọ́tì',       a:'2Ti',ch:4 },
  {n:'Títọ̀sì',        a:'Tít',ch:3 }, {n:'Fílímónì',        a:'Fím',ch:1 },
  {n:'Hébérù',        a:'Héb',ch:13}, {n:'Jémísì',          a:'Jém',ch:5 },
  {n:'1 Pétérù',      a:'1Pe',ch:5 }, {n:'2 Pétérù',        a:'2Pe',ch:3 },
  {n:'1 Jòhánù',      a:'1Jo',ch:5 }, {n:'2 Jòhánù',        a:'2Jo',ch:1 },
  {n:'3 Jòhánù',      a:'3Jo',ch:1 }, {n:'Júùdù',           a:'Júù',ch:1 },
  {n:'Ìfihàn',        a:'Ìfi',ch:22},
];
const OT_COUNT = 39;

const DAILY = [
  {t:'"Fẹ́ran Olúwa Ọlọ́run rẹ pẹ̀lú ọkàn rẹ jù lọ, pẹ̀lú ẹ̀mí rẹ jù lọ."',r:'Mátíù 22:37'},
  {t:'"Nítorí Ọlọ́run fẹ́ran ayé tó débí pé Ó fi Ọmọ rẹ̀ Ìkanṣoṣo fún."',    r:'Jòhánù 3:16'},
  {t:'"Mo lè ṣe ohun gbogbo nípasẹ̀ Kristi tí ń fún mi ní agbára."',           r:'Fílípì 4:13'},
  {t:'"Olúwa ni Olùṣọ́ mi; Èmi kì yóò ní àìní."',                              r:'Sáàmù 23:1'},
  {t:'"Gbẹ́kẹ̀lé Olúwa pẹ̀lú ọkàn rẹ jù lọ, má gbẹ́kẹ̀lé ìmọ̀ tirẹ̀ nìkọ̀."', r:'Òwe 3:5'},
  {t:'"Ẹ wá sí ọ̀dọ̀ mi, gbogbo ẹ̀yin tí ẹ̀yin rẹ̀ àti ẹ̀rù inú wọn."',       r:'Mátíù 11:28'},
  {t:'"Bẹ̀rẹ̀ nínú ọ̀nà rẹ̀, ọmọdé yóò má àgbàdo sí."',                        r:'Òwe 22:6'},
];

// ── State ─────────────────────────────────────
const state = {
  tab:       'home',
  bookIdx:   -1,
  chapter:   0,
  testament: 'old',
  theme:     localStorage.getItem('lasb-theme')    || 'light',
  fontSize:  parseInt(localStorage.getItem('lasb-fs')) || 18,
  bookmarks: JSON.parse(localStorage.getItem('lasb-bm') || '[]'),
  audio: {
    bookIdx:  -1,
    chapter:   0,
    playing:   false,
    speed:     1,
    src:       null,
    mode:      null,   // 'file' | 'tts'
    ttsVerses: [],
    ttsIdx:    0,
    currentVerse: -1,
  },
};

// ── Audio element & TTS ────────────────────────
const audioEl = document.getElementById('audioEl');
let _ttsUtterance = null;
let _seeking = false;

// ── DOM helpers ───────────────────────────────
const $ = id => document.getElementById(id);
function fmtTime(s) {
  s = Math.floor(s || 0);
  return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
}
// Cache for online-fetched verses when bible_data.js is absent
// Values: undefined = not yet requested, null = loading, [] = failed, [...] = verses
const _onlineCache = {};

async function _fetchOnlineVerses(bookNum, chapterNum) {
  const key = `${bookNum}-${chapterNum}`;
  _onlineCache[key] = null; // mark loading
  // getbible.net API: verses is an array, text field holds verse content
  try {
    const r = await fetch(`https://api.getbible.net/v2/kjv/${bookNum}/${chapterNum}.json`);
    if (r.ok) {
      const d = await r.json();
      const vs = (d.verses || []).map(v => (v.text || '').trim()).filter(Boolean);
      if (vs.length) {
        _onlineCache[key] = vs;
        if (state.tab === 'verses' &&
            state.bookIdx + 1 === bookNum &&
            state.chapter === chapterNum) renderVerses();
        return;
      }
    }
  } catch(_) {}
  _onlineCache[key] = []; // failed
  if (state.tab === 'verses' &&
      state.bookIdx + 1 === bookNum &&
      state.chapter === chapterNum) renderVerses();
}

function getVerses(bookNum, chapter) {
  if (window.BIBLE_DATA) return window.BIBLE_DATA[`${bookNum}-${chapter}`] || [];
  const key = `${bookNum}-${chapter}`;
  // undefined = not fetched yet, null = loading, array = ready/failed
  return _onlineCache.hasOwnProperty(key) ? (_onlineCache[key] || []) : undefined;
}
function getAudio(bookNum, chapter) {
  if (!window.AUDIO_MAP) return null;
  return window.AUDIO_MAP[`${bookNum}-${chapter}`] || null;
}
function hasAudio(bookNum, chapter) {
  return !!getAudio(bookNum, chapter);
}
let _toastTimer;
function showToast(msg, dur = 2200) {
  const el = $('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), dur);
}
function saveBookmarks() {
  localStorage.setItem('lasb-bm', JSON.stringify(state.bookmarks));
}
function isBookmarked(bookIdx, chapter, verseIdx) {
  return state.bookmarks.some(b => b.bi === bookIdx && b.ch === chapter && b.vi === verseIdx);
}
function toggleBookmark(bookIdx, chapter, verseIdx) {
  const b = BOOKS[bookIdx];
  const verses = getVerses(bookIdx + 1, chapter);
  const text = verses[verseIdx] || '';
  const ref = `${b.n} ${chapter}:${verseIdx + 1}`;
  const idx = state.bookmarks.findIndex(x => x.bi === bookIdx && x.ch === chapter && x.vi === verseIdx);
  if (idx >= 0) {
    state.bookmarks.splice(idx, 1);
    showToast('Àmì ìwé tí yọ');
  } else {
    state.bookmarks.unshift({ bi: bookIdx, ch: chapter, vi: verseIdx, ref, text });
    showToast('🔖 Àmì ìwé tí fipamọ́');
  }
  saveBookmarks();
  // refresh verse display if open
  if (state.tab === 'home' && state.bookIdx === bookIdx && state.chapter === chapter) {
    renderVerses();
  }
  if (state.tab === 'bookmarks') renderBookmarkScreen();
}

// ── Theme & font ──────────────────────────────
function applyTheme(name) {
  state.theme = name;
  localStorage.setItem('lasb-theme', name);
  document.documentElement.className = name === 'dark' ? 'dark' : '';
  renderSettingsScreen();
}
function setFontSize(delta) {
  state.fontSize = Math.max(14, Math.min(28, state.fontSize + delta));
  localStorage.setItem('lasb-fs', state.fontSize);
  document.documentElement.style.setProperty('--fs', state.fontSize + 'px');
  $('settingsContent').querySelector('.f-val').textContent = state.fontSize;
}

// ── Screen switching ──────────────────────────
const SCREENS = ['home','chapters','verses','search','bookmarks','audio','settings'];
function showScreen(name) {
  SCREENS.forEach(s => {
    const el = $('s-' + s);
    if (el) el.classList.toggle('active', s === name);
  });
  // Update nav active state
  document.querySelectorAll('.nav-item').forEach(el => {
    const t = el.dataset.tab;
    el.classList.toggle('active', t === name || (name === 'chapters' && t === 'home') || (name === 'verses' && t === 'home'));
  });
}
function switchTab(tab) {
  state.tab = tab;
  showScreen(tab);
  if (tab === 'home')      { state.bookIdx = -1; state.chapter = 0; renderHome(); }
  if (tab === 'search')    { setTimeout(() => $('searchInput').focus(), 100); }
  if (tab === 'bookmarks') renderBookmarkScreen();
  if (tab === 'audio')     renderAudioScreen();
  if (tab === 'settings')  renderSettingsScreen();
}

// ── HOME SCREEN ───────────────────────────────
function renderHome() {
  const saved = localStorage.getItem('lasb-votd');
  const dv = saved ? JSON.parse(saved) : DAILY[new Date().getDay()];
  const books = state.testament === 'old' ? BOOKS.slice(0, OT_COUNT) : BOOKS.slice(OT_COUNT);
  const offset = state.testament === 'old' ? 0 : OT_COUNT;
  $('homeContent').innerHTML = `
    <div class="daily-card">
      <div class="daily-edit" id="dailyEditBtn" title="Change verse">✎</div>
      <div class="daily-tag">✦ Ẹsẹ Ọjọ Yìí</div>
      <div class="daily-txt">${dv.t}</div>
      <div class="daily-ref">${dv.r}</div>
    </div>
    <div class="section-hd">Àwọn Ìwé Mímọ́</div>
    <div class="tab-row">
      <div class="tab-btn${state.testament==='old'?' active':''}" data-action="testament" data-val="old">Majẹmu Lailai</div>
      <div class="tab-btn${state.testament==='new'?' active':''}" data-action="testament" data-val="new">Majẹmu Titun</div>
    </div>
    <div class="book-grid">
      ${books.map((b, i) => {
        const bi = i + offset;
        const bookNum = bi + 1;
        let audioCount = 0;
        for (let c = 1; c <= b.ch; c++) { if (hasAudio(bookNum, c)) audioCount++; }
        return `<div class="book-card${audioCount?'has-audio':''}" data-action="open-book" data-bi="${bi}">
          <div class="book-dot"></div>
          <div class="book-nm">${b.n}</div>
          <div class="book-ch">${b.ch} chapters${audioCount?` · 🔊${audioCount}`:''}</div>
        </div>`;
      }).join('')}
    </div>`;
}

// ── CHAPTERS SCREEN ───────────────────────────
function openBook(bi) {
  state.bookIdx = bi;
  state.chapter  = 0;
  state.tab = 'chapters';
  renderChapters();
  showScreen('chapters');
}
function renderChapters() {
  const b = BOOKS[state.bookIdx];
  if (!b) return;
  $('chHdrBack').textContent = b.n;
  const bookNum = state.bookIdx + 1;
  const playingCh = (state.audio.bookIdx === state.bookIdx) ? state.audio.chapter : 0;
  $('chapterContent').innerHTML = `
    <div class="scr-title">${b.n}</div>
    <div class="scr-sub">${b.ch} chapters · ${b.a}</div>
    <div class="ch-grid">
      ${Array.from({length: b.ch}, (_, i) => {
        const ch = i + 1;
        const hasFil = hasAudio(bookNum, ch);
        return `<div class="ch-btn${hasFil?' has-audio':''}${playingCh===ch?' playing':''}"
          data-action="open-chapter" data-ch="${ch}">${ch}</div>`;
      }).join('')}
    </div>`;
}

// ── VERSES SCREEN ─────────────────────────────
function openChapter(ch) {
  state.chapter = ch;
  state.tab = 'verses';
  renderVerses();
  showScreen('verses');
}
function renderVerses() {
  const b = BOOKS[state.bookIdx];
  if (!b) return;
  const bookNum = state.bookIdx + 1;
  const verses = getVerses(bookNum, state.chapter);
  const _playing = state.audio.playing;
  const _savedScroll = _playing ? $('verseContent').scrollTop : 0;
  const title = `${b.n} ${state.chapter}`;
  $('vHdrBack').textContent = b.n;
  // Update header play button
  const vpb = $('versePlayBtn');
  const isPlayingThis = state.audio.bookIdx === state.bookIdx
                     && state.audio.chapter  === state.chapter
                     && state.audio.playing;
  vpb.textContent = isPlayingThis ? '⏸' : '▶';
  vpb.classList.toggle('pause', isPlayingThis);

  const curVerse = state.audio.currentVerse;
  let html = `<div class="verse-topbar">
    <div>
      <div class="scr-title">${title}</div>
      <div class="scr-sub">${b.n} · ${(verses && verses.length) || '—'} verses</div>
    </div>
    <div class="vnav-btns">
      <div class="icon-btn" data-action="prev-verse-chapter" title="Previous chapter">‹</div>
      <div class="icon-btn" data-action="next-verse-chapter" title="Next chapter">›</div>
    </div>
  </div>
  <div class="divider" style="margin-top:14px"></div>`;

  if (verses && verses.length) {
    html += `<div class="verse-list">` +
      verses.map((v, i) => {
        const bm = isBookmarked(state.bookIdx, state.chapter, i);
        const active = (state.audio.bookIdx === state.bookIdx
                     && state.audio.chapter === state.chapter
                     && curVerse === i) ? ' playing' : '';
        return `<div class="verse-row${active}" data-action="verse-tap" data-vi="${i}">
          <span class="v-num">${i+1}</span>
          <span class="v-txt">${v}</span>
          <span class="v-bm${bm?' saved':''}" data-action="toggle-bm" data-vi="${i}">🔖</span>
        </div>`;
      }).join('') + `</div>`;
  } else if (verses === undefined) {
    // Not yet requested — kick off online fetch and show spinner
    _fetchOnlineVerses(bookNum, state.chapter);
    html += `<div class="no-data">⏳ Loading verses…</div>`;
  } else if (verses === null) {
    // Currently loading
    html += `<div class="no-data">⏳ Loading verses…</div>`;
  } else {
    // Empty array = failed or genuinely empty chapter
    html += `<div class="no-data">
      ${window.BIBLE_DATA
        ? 'No verses found for this chapter.'
        : '⚠ Could not load verses. Run: <code>python3 fetch_bible_data.py</code>'}
    </div>`;
  }
  $('verseContent').innerHTML = html;
  if (_playing) $('verseContent').scrollTop = _savedScroll;
}
function prevChapter() {
  if (state.chapter > 1) {
    state.chapter--;
    renderVerses();
    if (!state.audio.playing) $('verseContent').scrollTop = 0;
  }
}
function nextChapter() {
  const b = BOOKS[state.bookIdx];
  if (b && state.chapter < b.ch) {
    state.chapter++;
    renderVerses();
    if (!state.audio.playing) $('verseContent').scrollTop = 0;
  }
}

// ── AUDIO PLAYER ──────────────────────────────
function playChapter(bookIdx, chapter, fromVerse = 0) {
  const bookNum = bookIdx + 1;
  const b = BOOKS[bookIdx];
  if (!b) return;

  state.audio.bookIdx = bookIdx;
  state.audio.chapter  = chapter;
  state.audio.currentVerse = fromVerse;

  const src = getAudio(bookNum, chapter);
  if (src) {
    _stopTTS();
    state.audio.mode = 'file';
    audioEl.src = src;
    audioEl.playbackRate = state.audio.speed;
    audioEl.play().then(() => {
      state.audio.playing = true;
      updateAudioBar();
      updateVersePlayBtn();
    }).catch(e => {
      showToast('Kò lè ṣeré: ' + (e.message || 'àṣìṣe'));
    });
  } else {
    // TTS fallback
    const verses = getVerses(bookNum, chapter);
    if (!verses || !verses.length) { showToast('No audio or verses for this chapter'); return; }
    state.audio.mode = 'tts';
    state.audio.ttsVerses = verses;
    state.audio.ttsIdx = fromVerse;
    state.audio.playing = true;
    audioEl.src = '';
    _ttsPlayNext();
  }
  updateAudioBar();
  updateVersePlayBtn();
  if (state.tab === 'audio') renderAudioScreen();
  if (state.tab === 'home'  && state.bookIdx === bookIdx && state.chapter === chapter) renderVerses();
}

function _ttsPlayNext() {
  if (!state.audio.playing || state.audio.mode !== 'tts') return;
  const verses = state.audio.ttsVerses;
  if (state.audio.ttsIdx >= verses.length) {
    state.audio.playing = false;
    updateAudioBar(); updateVersePlayBtn();
    return;
  }
  if (!window.speechSynthesis) { state.audio.playing = false; return; }
  _stopTTS();
  const utt = new SpeechSynthesisUtterance(verses[state.audio.ttsIdx]);
  utt.lang = 'yo';
  utt.rate = state.audio.speed;
  _ttsUtterance = utt;
  utt.onend = () => {
    if (_ttsUtterance !== utt) return;
    state.audio.ttsIdx++;
    state.audio.currentVerse = state.audio.ttsIdx;
    _ttsPlayNext();
    updateAudioBar();
    _highlightVerse();
  };
  utt.onerror = (e) => {
    if (_ttsUtterance !== utt) return;
    if (e.error === 'interrupted' || e.error === 'canceled') return;
    state.audio.ttsIdx++;
    _ttsPlayNext();
  };
  state.audio.currentVerse = state.audio.ttsIdx;
  _highlightVerse();
  speechSynthesis.speak(utt);
}
function _stopTTS() {
  if (_ttsUtterance) {
    _ttsUtterance.onend = null;
    _ttsUtterance.onerror = null;
    _ttsUtterance = null;
  }
  if (window.speechSynthesis) speechSynthesis.cancel();
}
function stopAudio() {
  audioEl.pause();
  audioEl.currentTime = 0;
  _stopTTS();
  state.audio.playing = false;
  state.audio.bookIdx = -1;
  state.audio.chapter = 0;
  state.audio.src = '';
  state.audio.currentVerse = -1;
  updateAudioBar();
  updateVersePlayBtn();
  renderVerses();
  if (state.tab === 'audio') renderAudioScreen();
}
function togglePlay() {
  if (!state.audio.src && state.audio.mode !== 'tts') return;
  if (state.audio.mode === 'file') {
    if (audioEl.paused) {
      audioEl.play().then(() => { state.audio.playing = true; updateAudioBar(); });
    } else {
      audioEl.pause();
      state.audio.playing = false;
      updateAudioBar();
    }
  } else if (state.audio.mode === 'tts') {
    if (state.audio.playing) {
      _stopTTS();
      state.audio.playing = false;
    } else {
      state.audio.playing = true;
      _ttsPlayNext();
    }
    updateAudioBar();
  }
  updateVersePlayBtn();
  if (state.tab === 'audio') _updateAudioPlayerUI();
}
function toggleChapterPlay() {
  if (state.bookIdx < 0 || !state.chapter) return;
  const same = state.audio.bookIdx === state.bookIdx
            && state.audio.chapter  === state.chapter;
  if (same && state.audio.playing) {
    togglePlay();
  } else if (same && !state.audio.playing) {
    togglePlay();
  } else {
    playChapter(state.bookIdx, state.chapter);
  }
}
function skipAudio(secs) {
  if (state.audio.mode !== 'file') return;
  audioEl.currentTime = Math.max(0, Math.min(audioEl.duration || 0, audioEl.currentTime + secs));
}
function prevChapterAudio() {
  if (state.audio.bookIdx < 0) return;
  const ch = state.audio.chapter - 1;
  if (ch >= 1) playChapter(state.audio.bookIdx, ch);
}
function nextChapterAudio() {
  const b = BOOKS[state.audio.bookIdx];
  if (!b) return;
  const ch = state.audio.chapter + 1;
  if (ch <= b.ch) playChapter(state.audio.bookIdx, ch);
  else { state.audio.playing = false; updateAudioBar(); }
}
function setSpeed(spd) {
  state.audio.speed = spd;
  audioEl.playbackRate = spd;
  if (_ttsUtterance) _ttsUtterance.rate = spd;
  if (state.tab === 'audio') _updateAudioPlayerUI();
}
function _highlightVerse() {
  if (state.tab !== 'verses') return;
  document.querySelectorAll('.verse-row').forEach((row, i) => {
    row.classList.toggle('playing', i === state.audio.currentVerse
      && state.audio.bookIdx === state.bookIdx
      && state.audio.chapter === state.chapter);
  });
}

// ── Audio event listeners ──────────────────────
audioEl.addEventListener('play',  () => { state.audio.playing = true;  updateAudioBar(); updateVersePlayBtn(); });
audioEl.addEventListener('pause', () => { state.audio.playing = false; updateAudioBar(); updateVersePlayBtn(); });
audioEl.addEventListener('ended', () => { nextChapterAudio(); });
audioEl.addEventListener('timeupdate', () => {
  if (_seeking) return;
  const pct = audioEl.duration ? (audioEl.currentTime / audioEl.duration) * 100 : 0;
  $('barProgress').style.width = pct + '%';
  if (state.tab === 'audio') {
    const fill = document.querySelector('.seek-fill');
    const inp  = document.querySelector('.seek-input');
    if (fill) fill.style.width = pct + '%';
    if (inp)  inp.value = audioEl.currentTime;
    const ct = $('ap-cur'), tt = $('ap-tot');
    if (ct) ct.textContent = fmtTime(audioEl.currentTime);
    if (tt) tt.textContent = fmtTime(audioEl.duration);
    // Approximate verse highlight
    if (window.BIBLE_DATA && isFinite(audioEl.duration) && audioEl.duration > 0) {
      const verses = getVerses(state.audio.bookIdx + 1, state.audio.chapter);
      if (verses && verses.length) {
        const vi = Math.min(verses.length - 1,
          Math.floor((audioEl.currentTime / audioEl.duration) * verses.length));
        if (vi !== state.audio.currentVerse) {
          state.audio.currentVerse = vi;
          _updateAudioVerseDisplay();
        }
      }
    }
  }
});
audioEl.addEventListener('loadedmetadata', () => {
  const inp = document.querySelector('.seek-input');
  if (inp) inp.max = audioEl.duration;
  const tt = $('ap-tot');
  if (tt) tt.textContent = fmtTime(audioEl.duration);
  state.audio.src = audioEl.src;
  updateAudioBar();
});
audioEl.addEventListener('error', () => {
  // Audio file failed — fall back to TTS
  const bi = state.audio.bookIdx;
  const ch = state.audio.chapter;
  if (bi >= 0 && ch > 0) {
    const verses = getVerses(bi + 1, ch);
    if (verses && verses.length) {
      state.audio.mode = 'tts';
      state.audio.ttsVerses = verses;
      state.audio.ttsIdx = state.audio.currentVerse || 0;
      state.audio.playing = true;
      audioEl.src = '';
      _ttsPlayNext();
      updateAudioBar();
      return;
    }
  }
  state.audio.playing = false;
  updateAudioBar();
});

// ── Audio Bar ──────────────────────────────────
function updateAudioBar() {
  const bar = $('audioBar');
  const bi = state.audio.bookIdx;

  const vpb = $('versePlayBtn');

}

function _updateAudioPlayerUI() {

  if (state.tab !== 'audio') return;

}

// ── SEARCH ────────────────────────────────────
let _searchTimer;
function doSearch(query) {
  query = query.trim();
  const res = $('searchResults');
  if (!query) { res.innerHTML = ''; return; }
  if (!window.BIBLE_DATA) {
    res.innerHTML = `<div class="empty"><div class="empty-ico">📖</div>
      <div class="empty-txt">Run <code>python3 fetch_bible_data.py</code> to load verses.</div></div>`;
    return;
  }
  const q = query.toLowerCase();
  const found = [];
  for (const [key, verses] of Object.entries(window.BIBLE_DATA)) {
    if (found.length >= 60) break;
    const [bn, cn] = key.split('-').map(Number);
    const b = BOOKS[bn - 1];
    if (!b) continue;
    verses.forEach((v, vi) => {
      if (found.length < 60 && v.toLowerCase().includes(q)) {
        found.push({ ref: `${b.n} ${cn}:${vi+1}`, text: v, bi: bn-1, ch: cn, vi });
      }
    });
  }
  if (!found.length) {
    res.innerHTML = `<div class="empty"><div class="empty-ico">🔍</div>
      <div class="empty-txt">No verses found for "<strong>${query}</strong>"</div></div>`;
    return;
  }
  const esc = s => s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  const re  = new RegExp(`(${esc(query)})`, 'gi');
  res.innerHTML = found.map(r =>
    `<div class="search-res" data-action="open-result" data-bi="${r.bi}" data-ch="${r.ch}" data-vi="${r.vi}">
      <div class="res-ref">${r.ref}</div>
      <div class="res-txt">${r.text.replace(re, '<em>$1</em>')}</div>
    </div>`
  ).join('');
}

      <div style="color:${window.AUDIO_MAP?'#4caf50':'#e57373'};font-size:20px">${window.AUDIO_MAP?'✓':'✗'}</div>
    </div>
    <div class="set-row">
      <div>
        <div class="set-label">Bible Data</div>
        <div class="set-sub">${window.BIBLE_DATA ? Object.keys(window.BIBLE_DATA).length + ' chapters loaded' : '⚠ bible_data.js kò sí'}</div>
      </div>
      <div style="color:${window.BIBLE_DATA?'#4caf50':'#e57373'};font-size:20px">${window.BIBLE_DATA?'✓':'✗'}</div>
    </div>
    <div class="set-section">Àgbékalẹ̀ Faili</div>
    <div class="set-row" style="justify-content:center;padding:16px 0">
      <div style="font-size:13px;color:#888;letter-spacing:0.5px">Powered by SoundMasterH1</div>
    </div>
  `;
}

// ── Unified event delegation ───────────────────
document.getElementById('app').addEventListener('click', e => {
  const t = e.target.closest('[data-action]');
  if (!t) return;
  const a  = t.dataset.action;
  e.stopPropagation();

  if (a === 'testament')  { state.testament = t.dataset.val; renderHome(); return; }
  if (a === 'go-search')  { switchTab('search'); return; }
  if (a === 'go-settings'){ switchTab('settings'); return; }
  if (a === 'go-audio')   { switchTab('audio'); renderAudioScreen(); return; }
  if (a === 'back-home')  { switchTab('home'); return; }
  if (a === 'back-chapters'){ state.tab='chapters'; showScreen('chapters'); return; }
  if (a === 'open-book')  { openBook(parseInt(t.dataset.bi)); return; }
  if (a === 'open-chapter'){ openChapter(parseInt(t.dataset.ch)); return; }
  if (a === 'toggle-bm')  {
    e.stopPropagation();
    toggleBookmark(state.bookIdx, state.chapter, parseInt(t.dataset.vi));
    return;
  }
  if (a === 'verse-tap')  {
    return;
  }
  if (a === 'toggle-chapter-play') { toggleChapterPlay(); return; }
  if (a === 'toggle-play')  { togglePlay(); return; }
  if (a === 'stop-audio')   { stopAudio(); return; }
  if (a === 'prev-verse-chapter') { prevChapter(); return; }
  if (a === 'next-verse-chapter') { nextChapter(); return; }
  if (a === 'prev-chapter') { prevChapterAudio(); return; }
  if (a === 'next-chapter') { nextChapterAudio(); return; }
  if (a === 'skip')  { skipAudio(parseFloat(t.dataset.secs)); return; }
  if (a === 'set-speed') { setSpeed(parseFloat(t.dataset.spd)); return; }
  if (a === 'set-theme') { applyTheme(t.dataset.val); return; }
  if (a === 'font')  { setFontSize(parseInt(t.dataset.delta)); return; }
  if (a === 'open-result') {
    const bi = parseInt(t.dataset.bi), ch = parseInt(t.dataset.ch);
    state.bookIdx = bi; state.chapter = ch;
    state.tab = 'verses';
    renderVerses(); showScreen('verses');
    const vi = parseInt(t.dataset.vi);
    setTimeout(() => {
      const row = document.querySelectorAll('.verse-row')[vi];
      if (row) row.scrollIntoView({ behavior:'smooth', block:'center' });
    }, 150);
    return;
  }
  if (a === 'del-bm') {
    const idx = parseInt(t.dataset.idx);
    state.bookmarks.splice(idx, 1);
    saveBookmarks();
    renderBookmarkScreen();
    return;
  }
});

// Nav bar
document.querySelectorAll('.nav-item').forEach(el => {
  el.addEventListener('click', () => switchTab(el.dataset.tab));
});

// Search input
$('searchInput').addEventListener('input', e => {
  clearTimeout(_searchTimer);
  _searchTimer = setTimeout(() => doSearch(e.target.value), 300);
});

// ── Audio Picker Binding ───────────────────────
function _bindAudioPicker() {
  const bookSel = $('apPickBook');
  const chapSel = $('apPickChapter');
  if (!bookSel) return;
  bookSel.addEventListener('change', () => {
    const bi = parseInt(bookSel.value);
    chapSel.innerHTML = Array.from({length:BOOKS[bi].ch},(_,i)=>`<option value="${i+1}">${i+1}</option>`).join('');
  });
  $('apPlayNow').addEventListener('click', () => {
    const bi = parseInt(bookSel.value);
    const ch = parseInt(chapSel.value);
    playChapter(bi, ch);
  });
}

// ── Verse Picker ──────────────────────────────
let _vpickVerseIdx = -1;

function openVersePicker() {
  const sel = $('vpickBook');
  sel.innerHTML = BOOKS.map((b,i) => `<option value="${i}">${b.n}</option>`).join('');
  sel.value = 0;
  vpickUpdateChapters();
  $('vpickOverlay').classList.add('show');
}

function vpickUpdateChapters() {
  const bi = parseInt($('vpickBook').value);
  const b = BOOKS[bi];
  const ch = $('vpickChapter');
  ch.innerHTML = Array.from({length:b.ch},(_,i)=>`<option value="${i+1}">${i+1}</option>`).join('');
  ch.value = 1;
  _vpickVerseIdx = -1;
  vpickUpdateVerses();
}

function vpickUpdateVerses() {
  const bi = parseInt($('vpickBook').value);
  const ch = parseInt($('vpickChapter').value);
  const verses = getVerses(bi+1, ch) || [];
  _vpickVerseIdx = -1;
  $('vpickVerseList').innerHTML = verses.map((v,i) =>
    `<div class="vpick-v" data-vi="${i}"><strong>${i+1}</strong>  ${v}</div>`
  ).join('') || '<div style="color:var(--txt3);padding:10px">No verses loaded</div>';
  $('vpickVerseList').querySelectorAll('.vpick-v').forEach(el => {
    el.addEventListener('click', () => {
      $('vpickVerseList').querySelectorAll('.vpick-v').forEach(e=>e.classList.remove('sel'));
      el.classList.add('sel');
      _vpickVerseIdx = parseInt(el.dataset.vi);
    });
  });
}

$('vpickBook').addEventListener('change', vpickUpdateChapters);
$('vpickChapter').addEventListener('change', vpickUpdateVerses);

$('vpickCancel').addEventListener('click', () => $('vpickOverlay').classList.remove('show'));
$('vpickOverlay').addEventListener('click', e => { if(e.target===$('vpickOverlay')) $('vpickOverlay').classList.remove('show'); });

$('vpickSave').addEventListener('click', () => {
  if (_vpickVerseIdx < 0) { showToast('Select a verse first'); return; }
  const bi = parseInt($('vpickBook').value);
  const ch = parseInt($('vpickChapter').value);
  const verses = getVerses(bi+1, ch) || [];
  const v = verses[_vpickVerseIdx];
  if (!v) return;
  const ref = `${BOOKS[bi].n} ${ch}:${_vpickVerseIdx+1}`;
  localStorage.setItem('lasb-votd', JSON.stringify({t:`"${v}"`, r:ref}));
  $('vpickOverlay').classList.remove('show');
  renderHome();
  showToast('Verse of the Day updated');
});

document.addEventListener('click', e => {
  if (e.target && e.target.id === 'dailyEditBtn') openVersePicker();
});

// ── Init ──────────────────────────────────────
applyTheme(state.theme);
document.documentElement.style.setProperty('--fs', state.fontSize + 'px');
renderHome();
</script>
