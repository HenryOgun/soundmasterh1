<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Mode / Light Mode</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1 id="banner">Light Mode</h1>
        <div class="button-container">
            <button id="dark-btn">Dark</button>
            <button id="light-btn">Light</button>
            <button id="toggle-btn">Switch</button>
        </div>
        
        <!-- Extra challenge: Custom theme controls -->
        <div class="custom-theme">
            <h3>Custom Theme</h3>
            <div class="color-controls">
                <label for="bg-color">Background Color:</label>
                <input type="color" id="bg-color" value="#ffffff">
                
                <label for="text-color">Text Color:</label>
                <input type="color" id="text-color" value="#000000">
                
                <button id="apply-custom">Apply Custom</button>
            </div>
        </div>
        
        <button id="reset-btn" class="reset-button">Reset Preferences</button>
    </div>

    <script src="app.js"></script>
</body>
</html>
